<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>KeyRush</title>  
    </head>
    <body>
        <div class="container">
            <header class="header">
                <h1 class="title">KeyRush</h1>
                <p class="subtitle">Test your typing speed and accuracy</p>
            </header>
           <div class="stat-container">
            <div class="stat-card">
                <div class="stat-value" id="wpmStat">0</div>
                    <div class="stat-label">Words Per Minutes</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="accuracy">0%</div>
                    <div class="stat-label">Accuracy</div>
            
           </div>
           <div class="stat-card">
                <div class="stat-value" id="charsStat">0</div>
                    <div class="stat-label">Characters</div>
            </div>
        </div>

        <div class="timer" id="timer">1:00</div>
        <div class="text-display" id="textDisplay"></div>
        <div class="input-section">
            <input 
                type="text" 
                class="input-field" 
                id="inputField"
                placeholder="Start typing to begin..." 
                autocomplete="off"
                autocorrect="off"
                autocapitalize="off"
                spellcheck="false">
        </div>
        <div class="controls">
            <button class="btn btn-primary" id="StartBtn">Start Here</button>
            <button class="btn btn-secondary" id="changeTextBtn">Change Text</button>
        </div>
    </div>

    <!-- Results Modal -->
    <div class="modal" id="resultsModal">
        <div class="modal-content">
            <h2>Test Results</h2>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-value" id="finalWpm">0</div>
                    <div class="result-label">WPM</div>
                </div>
                <div class="result-stat">
                    <div class="result-value" id="finalAccuracy">0%</div>
                    <div class="result-label">Accuracy</div>
            </div>
            <div class="result-stat">
                    <div class="result-value" id="finalCharacters">0%</div>
                    <div class="result-label">Characters</div>
            <div class="result-stat">
                    <div class="result-value" id="finalErrors">0</div>
                    <div class="result-label">Errors</div>
        </div>
    </div>
    <button class="btn btn-primary" onclick="RestartTest()">
        Try Again
    </button>
    </div>
</div>
</div>

        </body>
        </html>
